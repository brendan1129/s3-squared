service: cloud-storage-wrapper-api

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  environment:
    BUCKET_NAME: ${self:custom.bucketName}
  iam:
    role:
      statements:
        - Effect: Allow
          Action: [ s3:PutObject ]
          Resource: [ arn:aws:s3:::${self:custom.bucketName}/* ]
        - Effect: Allow
          Action: [ s3:ListBucket ]
          Resource: [ arn:aws:s3:::${self:custom.bucketName} ]
        - Effect: Allow
          Action: [ s3:GetObject ]
          Resource: [ arn:aws:s3:::${self:custom.bucketName}/* ]
        - Effect: Allow
          Action: [ s3:DeleteObject ]
          Resource: [ arn:aws:s3:::${self:custom.bucketName}/* ]
  httpApi:
    cors: true
    authorizers:
      cognitoAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}
        audience:
          - !Ref CognitoUserPoolClient

custom:
  bucketName: s9-master-bucket

functions:
  getUploadUrl:
    handler: handler.getUploadUrl
    events:
      - httpApi: { path: /request-upload, method: POST, authorizer: { name: cognitoAuthorizer } }

  listFiles:
    handler: handler.listFiles
    events:
      - httpApi: { path: /list-files, method: GET, authorizer: { name: cognitoAuthorizer } }

  getDownloadUrl:
    handler: handler.getDownloadUrl
    events:
      - httpApi: { path: /download-url, method: GET, authorizer: { name: cognitoAuthorizer } }

  deleteFile:
    handler: handler.deleteFile
    events:
      - httpApi: { path: /delete-file, method: DELETE, authorizer: { name: cognitoAuthorizer } }

  renameFile:
    handler: handler.renameFile
    events:
      - httpApi: { path: /rename-file, method: POST, authorizer: { name: cognitoAuthorizer } }

  # Move file cross-directory — same IAM as rename (GetObject + PutObject + DeleteObject)
  moveFile:
    handler: handler.moveFile
    events:
      - httpApi: { path: /move-file, method: POST, authorizer: { name: cognitoAuthorizer } }

  createFolder:
    handler: handler.createFolder
    events:
      - httpApi: { path: /create-folder, method: POST, authorizer: { name: cognitoAuthorizer } }

resources:
  Resources:
    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: cloud-wrapper-users-pool
        UsernameAttributes: [ email ]
        AutoVerifiedAttributes: [ email ]

    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: flutter-mobile-client
        UserPoolId: !Ref CognitoUserPool
        GenerateSecret: false

    HttpApiAuthorizerCognitoAuthorizer:
      Type: AWS::ApiGatewayV2::Authorizer
      Properties:
        Name: cloud-storage-cognito-authorizer
        ApiId: !Ref HttpApi
        AuthorizerType: JWT
        IdentitySource: [ $request.header.Authorization ]
        AuthorizerResultTtlInSeconds: 0
        JwtConfiguration:
          Audience: [ !Ref CognitoUserPoolClient ]
          Issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}

    MasterStorageBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.bucketName}

  Outputs:
    UserPoolId:
      Value: !Ref CognitoUserPool
      Description: "Use this value for _userPoolId in Flutter"
    UserPoolClientId:
      Value: !Ref CognitoUserPoolClient
      Description: "Use this value for _clientId in Flutter"